<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Beauty</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb, #fcd6f6, #ffe3f3);
        }

        .card {
            background: white;
            padding: 40px 35px;
            width: 380px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #d63384;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 25px;
            color: #444;
        }

        label {
            font-size: 14px;
            color: #777;
            display: block;
            text-align: left;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #f1c0e8;
            outline: none;
            margin-bottom: 20px;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d63384;
            box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff6fa5, #d63384);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .resultado {
            margin-top: 25px;
            font-size: 20px;
            font-weight: 600;
            color: #d63384;
        }

        .info {
            margin-top: 10px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">Lau Cosmetics</div>
        <h2>Calculadora de Precio de Venta</h2>
        

        <label>Costo unitario</label>
        <input type="number" id="costo" placeholder="Ej: 25000" step="0.01">

        <button onclick="calcular()">Calcular Precio</button>

        <div class="resultado" id="resultado"></div>
        <div class="info">Margen aplicado: 40%</div>
        <div class="info">Te amo❤️</div>
    </div>

    <script>
        function calcular() {
            const costo = parseFloat(document.getElementById("costo").value);

            if (isNaN(costo) || costo <= 0) {
                document.getElementById("resultado").innerText = "Ingresa un valor válido.";
                return;
            }

            const precioVenta = costo / (1 - 0.40);

            document.getElementById("resultado").innerText =
                "Precio sugerido: $" + precioVenta.toLocaleString("es-CO", {
                    minimumFractionDigits: 0
                });
        }
    </script>

</body>

</html>
