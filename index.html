<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>LauCosmetics</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

    <div class="container">

        <h1>LauCosmetics</h1>

        <h2>Agregar Producto</h2>

        <form id="form">
            <input type="text" id="producto" placeholder="Nombre del producto" required />
            <input type="number" id="cantidad" placeholder="Cantidad" required />
            <input type="number" id="costo" placeholder="Costo" required />
            <input type="number" step="0.01" id="margen" placeholder="Margen (20 = 20%)" required />
            <button type="submit">Guardar Producto</button>
        </form>

        <div class="venta-section">
            <h2>Registrar Venta</h2>
            <input type="search" id="buscarVenta" placeholder="Buscar producto..." />
            <form id="ventaForm">
                <select id="ventaProducto" required>
                    <option value="">Seleccione un producto</option>
                </select>
                <input type="number" id="cantidadVendida" placeholder="Cantidad a vender" required />
                <button type="submit">Vender</button>
            </form>
        </div>

        <div class="venta-section">
            <h2>Agregar Stock</h2>
            <input type="search" id="buscarStock" placeholder="Buscar producto..." />
            <form id="stockForm">
                <select id="stockProducto" required>
                    <option value="">Seleccione un producto</option>
                </select>
                <input type="number" id="cantidadAgregar" placeholder="Cantidad a agregar" required />
                <button type="submit">Agregar Stock</button>
            </form>
        </div>

        <div class="venta-section">
            <h2>Revertir Venta</h2>
            <input type="search" id="buscarDelete" placeholder="Buscar producto..." />
            <form id="deleteVentaForm">
                <select id="deleteProducto" required>
                    <option value="">Seleccione un producto</option>
                </select>
                <input type="number" id="cantidadEliminar" placeholder="Cantidad a revertir" required />
                <button type="submit">Revertir Venta</button>
            </form>
        </div>

        <h2>Lista de Productos</h2>
        <input type="text" id="buscarTabla" placeholder="Buscar en la tabla..." />

        <table id="tabla">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Disponibles</th>
                    <th>Costo</th>
                    <th>Margen</th>
                    <th>Precio Venta</th>
                    <th>Total Invertido</th>
                    <th>Total Ventas</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <script>
        const API = "https://laucosmetics.onrender.com/productos";
        const API_VENTA = "https://laucosmetics.onrender.com/ventas";
        const API_STOCK = "https://laucosmetics.onrender.com/stock";
        const API_REVERTIR = "https://laucosmetics.onrender.com/ventas/revertir";

        let productosGlobal = [];

        const form = document.getElementById("form");
        const ventaForm = document.getElementById("ventaForm");
        const stockForm = document.getElementById("stockForm");
        const deleteVentaForm = document.getElementById("deleteVentaForm");

        const tbody = document.querySelector("#tabla tbody");

        function formatoCOP(valor) {
            return "$" + valor.toLocaleString("es-CO");
        }

        function renderSelects(productos) {
            const selectVenta = document.getElementById("ventaProducto");
            const selectStock = document.getElementById("stockProducto");
            const selectDelete = document.getElementById("deleteProducto");

            selectVenta.innerHTML = `<option value="">Seleccione un producto</option>`;
            selectStock.innerHTML = `<option value="">Seleccione un producto</option>`;
            selectDelete.innerHTML = `<option value="">Seleccione un producto</option>`;

            productos.forEach(p => {
                const vendidos = p.cantidad - p.disponibles;

                const optionVenta = document.createElement("option");
                optionVenta.value = p.id;
                optionVenta.textContent = `${p.producto} (Stock: ${p.disponibles})`;
                if (p.disponibles === 0) {
                    optionVenta.disabled = true;
                    optionVenta.textContent += " - SIN STOCK";
                }

                const optionStock = document.createElement("option");
                optionStock.value = p.id;
                optionStock.textContent = `${p.producto} (Stock: ${p.disponibles})`;

                const optionDelete = document.createElement("option");
                optionDelete.value = p.id;
                optionDelete.textContent = `${p.producto} (Vendidos: ${vendidos})`;
                if (vendidos === 0) {
                    optionDelete.disabled = true;
                    optionDelete.textContent += " - SIN VENTAS";
                }

                selectVenta.appendChild(optionVenta);
                selectStock.appendChild(optionStock);
                selectDelete.appendChild(optionDelete);
            });
        }

        function renderTabla(productos) {
            tbody.innerHTML = "";
            productos.forEach(p => {
                const row = `
                <tr>
                    <td>${p.producto}</td>
                    <td>${p.cantidad}</td>
                    <td>${p.disponibles}</td>
                    <td>${formatoCOP(p.costo)}</td>
                    <td>${p.margen}%</td>
                    <td>${formatoCOP(p.precioVenta)}</td>
                    <td>${formatoCOP(p.totalinvertido)}</td>
                    <td>${formatoCOP(p.totalVentas)}</td>
                </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        async function cargarProductos() {
            const res = await fetch(API);
            const data = await res.json();
            productosGlobal = data;
            renderTabla(data);
            renderSelects(data);
        }

        function activarBuscadores() {

            function configurarBuscador(inputId) {
                const input = document.getElementById(inputId);

                const ejecutarFiltro = () => {
                    const filtro = input.value.toLowerCase();
                    renderSelects(
                        productosGlobal.filter(p =>
                            p.producto.toLowerCase().includes(filtro)
                        )
                    );
                };

                input.addEventListener("input", ejecutarFiltro);
                input.addEventListener("keyup", ejecutarFiltro);
                input.addEventListener("search", ejecutarFiltro);

                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        ejecutarFiltro();
                    }
                });
            }

            configurarBuscador("buscarVenta");
            configurarBuscador("buscarStock");
            configurarBuscador("buscarDelete");

            document.getElementById("buscarTabla").addEventListener("input", e => {
                const filtro = e.target.value.toLowerCase();
                renderTabla(
                    productosGlobal.filter(p =>
                        p.producto.toLowerCase().includes(filtro)
                    )
                );
            });
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                producto: producto.value,
                cantidad: Number(cantidad.value),
                costo: Number(costo.value),
                margen: Number(margen.value)
            };

            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            form.reset();
            cargarProductos();
        });

        ventaForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                id: ventaProducto.value,
                cantidadVendida: Number(cantidadVendida.value)
            };

            await fetch(API_VENTA, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            ventaForm.reset();
            cargarProductos();
        });

        stockForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                id: stockProducto.value,
                cantidad: Number(cantidadAgregar.value)
            };

            await fetch(API_STOCK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            stockForm.reset();
            cargarProductos();
        });

        deleteVentaForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                id: deleteProducto.value,
                cantidad: Number(cantidadEliminar.value)
            };

            await fetch(API_REVERTIR, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            deleteVentaForm.reset();
            cargarProductos();
        });

        cargarProductos();
        activarBuscadores();
    </script>

</body>

</html>
