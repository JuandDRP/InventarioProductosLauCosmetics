<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Beauty</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb, #fcd6f6, #ffe3f3);
        }

        .card {
            background: white;
            padding: 40px 35px;
            width: 380px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #d63384;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 25px;
            color: #444;
        }

        label {
            font-size: 14px;
            color: #777;
            display: block;
            text-align: left;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #f1c0e8;
            outline: none;
            margin-bottom: 15px;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d63384;
            box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff6fa5, #d63384);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 600;
            color: #d63384;
            line-height: 1.6;
        }

        .info {
            margin-top: 8px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">Lau Cosmetics</div>
        <h2>Calculadora de Precio de Venta</h2>

        <label>Costo unitario</label>
        <input type="number" id="costo" placeholder="Ej: 25000" step="0.01">

        <label>Margen (%)</label>
        <input type="number" id="margen" placeholder="Ej: 40" step="0.01">

        <button onclick="calcular()">Calcular Precio</button>

        <label>Descuento (%)</label>
        <input type="number" id="descuento" placeholder="Ej: 10" step="0.01">

        <button onclick="aplicarDescuento()">Aplicar Descuento</button>

        <div class="resultado" id="resultado"></div>
        <div class="info">Te amo❤️</div>
    </div>

    <script>
        let precioGlobal = 0;

        function calcular() {
            const costo = parseFloat(document.getElementById("costo").value);
            const margenInput = parseFloat(document.getElementById("margen").value);

            if (isNaN(costo) || costo <= 0) {
                document.getElementById("resultado").innerText = "Ingresa un costo válido.";
                return;
            }

            if (isNaN(margenInput) || margenInput <= 0 || margenInput >= 100) {
                document.getElementById("resultado").innerText = "Ingresa un margen válido (0 - 99).";
                return;
            }

            const margen = margenInput / 100;
            precioGlobal = costo / (1 - margen);

            document.getElementById("resultado").innerHTML =
                "Precio sugerido: $" + precioGlobal.toLocaleString("es-CO", {
                    minimumFractionDigits: 0
                });
        }

        function aplicarDescuento() {
            const descuentoInput = parseFloat(document.getElementById("descuento").value);

            if (precioGlobal === 0) {
                document.getElementById("resultado").innerText =
                    "Primero debes calcular el precio.";
                return;
            }

            if (isNaN(descuentoInput) || descuentoInput < 0 || descuentoInput >= 100) {
                document.getElementById("resultado").innerText =
                    "Ingresa un descuento válido (0 - 99).";
                return;
            }

            const descuento = descuentoInput / 100;
            const valorDescuento = precioGlobal * descuento;
            const precioConDescuento = precioGlobal - valorDescuento;

            document.getElementById("resultado").innerHTML =
                "Precio sugerido: $" + precioGlobal.toLocaleString("es-CO", { minimumFractionDigits: 0 }) + "<br>" +
                "Descuento aplicado: " + descuentoInput + "%<br>" +
                "Valor descontado: $" + valorDescuento.toLocaleString("es-CO", { minimumFractionDigits: 0 }) + "<br>" +
                "<strong>Precio con descuento: $" + precioConDescuento.toLocaleString("es-CO", { minimumFractionDigits: 0 }) + "</strong>";
        }
    </script>

</body>

</html>
