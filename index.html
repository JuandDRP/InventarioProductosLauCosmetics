<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>LauCosmetics</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

    <div class="container">

        <h1>LauCosmetics</h1>

        <!-- FORM PRODUCTO -->
        <h2>Agregar Producto</h2>

        <form id="form">
            <input type="text" id="producto" placeholder="Nombre del producto" required />
            <input type="number" id="cantidad" placeholder="Cantidad" required />
            <input type="number" id="costo" placeholder="Costo" required />
            <input type="number" step="0.01" id="margen" placeholder="Margen (20 = 20%)" required />

            <button type="submit">Guardar Producto</button>
        </form>

        <!-- FORM VENTA -->
        <div class="venta-section">
            <h2>Registrar Venta</h2>

            <form id="ventaForm">
                <select id="ventaProducto" required>
                    <option value="">Seleccione un producto</option>
                </select>

                <input type="number" id="cantidadVendida" placeholder="Cantidad a vender" required />

                <button type="submit">Vender</button>
            </form>
        </div>

        <!-- FORM STOCK -->
        <div class="venta-section">
            <h2>Agregar Stock</h2>

            <form id="stockForm">
                <select id="stockProducto" required>
                    <option value="">Seleccione un producto</option>
                </select>

                <input type="number" id="cantidadAgregar" placeholder="Cantidad a agregar" required />

                <button type="submit">Agregar Stock</button>
            </form>
        </div>

        <!-- FORM ELIMINAR VENTA -->
        <div class="venta-section">
            <h2>Revertir Venta</h2>

            <form id="deleteVentaForm">
                <select id="deleteProducto" required>
                    <option value="">Seleccione un producto</option>
                </select>

                <input type="number" id="cantidadEliminar" placeholder="Cantidad a revertir" required />

                <button type="submit">Revertir Venta</button>
            </form>
        </div>

        <!-- TABLA -->
        <h2>Lista de Productos</h2>

        <table id="tabla">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Disponibles</th>
                    <th>Costo</th>
                    <th>Margen</th>
                    <th>Precio Venta</th>
                    <th>Total Invertido</th>
                    <th>Total Ventas</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <script>
        const API = "http://localhost:3001/productos";
        const API_VENTA = "http://localhost:3001/ventas";
        const API_STOCK = "http://localhost:3001/stock";
        const API_REVERTIR = "http://localhost:3001/ventas/revertir";

        const form = document.getElementById("form");
        const ventaForm = document.getElementById("ventaForm");
        const stockForm = document.getElementById("stockForm");
        const deleteVentaForm = document.getElementById("deleteVentaForm");

        const tbody = document.querySelector("#tabla tbody");

        function formatoCOP(valor) {
            return "$" + valor.toLocaleString("es-CO");
        }

        // 🔄 Cargar productos
        async function cargarProductos() {
            const res = await fetch(API);
            const data = await res.json();

            tbody.innerHTML = "";

            const selectVenta = document.getElementById("ventaProducto");
            const selectStock = document.getElementById("stockProducto");
            const selectDelete = document.getElementById("deleteProducto");

            selectVenta.innerHTML = `<option value="">Seleccione un producto</option>`;
            selectStock.innerHTML = `<option value="">Seleccione un producto</option>`;
            selectDelete.innerHTML = `<option value="">Seleccione un producto</option>`;

            data.forEach(p => {

                // 📊 Tabla
                const row = `
          <tr>
            <td>${p.producto}</td>
            <td>${p.cantidad}</td>
            <td>${p.disponibles}</td>
            <td>${formatoCOP(p.costo)}</td>
            <td>${p.margen}%</td>
            <td>${formatoCOP(p.precioVenta)}</td>
            <td>${formatoCOP(p.totalinvertido)}</td>
            <td>${formatoCOP(p.totalVentas)}</td>
          </tr>
        `;
                tbody.innerHTML += row;

                const baseOption = document.createElement("option");
                baseOption.value = p.id;
                const vendidos = p.cantidad - p.disponibles;
                baseOption.textContent = `${p.producto} (Stock: ${p.disponibles})`;

                const optionVenta = baseOption.cloneNode(true);
                if (p.disponibles === 0) {
                    optionVenta.disabled = true;
                    optionVenta.textContent += " - SIN STOCK";
                }

                const optionStock = baseOption.cloneNode(true);

                const optionDelete = baseOption.cloneNode(true);
                optionDelete.textContent = `${p.producto} (Vendidos: ${vendidos})`;
                if (vendidos === 0) {
                    optionDelete.disabled = true;
                    optionDelete.textContent += " - SIN VENTAS";
                }
                selectVenta.appendChild(optionVenta);
                selectStock.appendChild(optionStock);
                selectDelete.appendChild(optionDelete);
            });
        }

        // ➕ Crear producto
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                producto: producto.value,
                cantidad: Number(cantidad.value),
                costo: Number(costo.value),
                margen: Number(margen.value)
            };

            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            alert("✅ Producto creado");
            form.reset();
            cargarProductos();
        });

        // 💰 Venta
        ventaForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                id: ventaProducto.value,
                cantidadVendida: Number(cantidadVendida.value)
            };

            const res = await fetch(API_VENTA, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            alert(result.mensaje || result.error);

            ventaForm.reset();
            cargarProductos();
        });

        // ➕ Stock
        stockForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                id: stockProducto.value,
                cantidad: Number(cantidadAgregar.value)
            };

            const res = await fetch(API_STOCK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            alert(result.mensaje || result.error);

            stockForm.reset();
            cargarProductos();
        });

        // ❌ Revertir venta
        deleteVentaForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                id: deleteProducto.value,
                cantidad: Number(cantidadEliminar.value)
            };

            const res = await fetch(API_REVERTIR, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            alert(result.mensaje || result.error);

            deleteVentaForm.reset();
            cargarProductos();
        });

        cargarProductos();
    </script>

</body>

</html>
